<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – PlugWerk</title>
  <link rel="stylesheet" href="tokens.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="page-wrapper">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ═══════════════ TOP BAR ═══════════════ -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="index.html" class="topbar__logo" aria-label="PlugWerk – back to catalog">
        <div class="topbar__logo-mark" aria-hidden="true">PW</div>
        <span class="topbar__logo-word">PlugWerk</span>
      </a>
      <div class="topbar__search" role="search">
        <span class="topbar__search-icon" aria-hidden="true">
          <i data-lucide="search" width="16" height="16"></i>
        </span>
        <input class="topbar__search-input" type="search" placeholder="Search plugins…" aria-label="Search plugins" />
      </div>
      <nav class="topbar__nav" aria-label="Main navigation">
        <a href="index.html" class="topbar__nav-link">Catalog</a>
      </nav>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
          <i data-lucide="sun" width="18" height="18" id="icon-light"></i>
          <i data-lucide="moon" width="18" height="18" id="icon-dark" style="display:none"></i>
        </button>
        <a href="login.html" class="btn btn--secondary btn--sm">Log In</a>
      </div>
    </div>
  </header>

  <!-- ═══════════════ ERROR CONTENT ═══════════════ -->
  <main id="main-content" class="error-page">
    <div class="error-page__inner">

      <!-- Illustration: missing puzzle piece with magnifying glass -->
      <svg
        class="error-page__illustration"
        viewBox="0 0 160 160"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        role="img"
      >
        <!-- Puzzle piece body -->
        <rect x="30" y="30" width="60" height="60" rx="6"/>
        <!-- Notch top -->
        <path d="M55 30 C55 22 65 22 65 30"/>
        <!-- Tab right -->
        <path d="M90 55 C98 55 98 65 90 65"/>
        <!-- Missing bottom-right piece — outline only -->
        <rect x="70" y="70" width="60" height="60" rx="6" stroke-dasharray="6 4" opacity="0.4"/>
        <!-- Magnifying glass -->
        <circle cx="116" cy="104" r="20"/>
        <line x1="130" y1="118" x2="144" y2="132"/>
        <!-- Question mark inside glass -->
        <text x="110" y="111" font-size="18" font-family="serif" stroke="none" fill="currentColor" text-anchor="middle">?</text>
      </svg>

      <div>
        <p class="error-page__code">Error 404</p>
        <h1 class="error-page__title">Page Not Found</h1>
      </div>

      <p class="error-page__desc">
        The page you're looking for doesn't exist, has been moved, or the URL contains a typo.
      </p>

      <a href="index.html" class="btn btn--primary btn--lg">
        <i data-lucide="arrow-left" width="18" height="18" aria-hidden="true"></i>
        Back to Catalog
      </a>
    </div>
  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand"><strong>PlugWerk</strong> <span>v1.2.0</span></div>
      <a href="#" class="footer__link">API Docs</a>
      <span class="footer__instance">ACME Corp Plugin Hub</span>
      <div class="footer__lang" style="margin-left:auto">
        <button class="footer__lang-btn footer__lang-btn--active" lang="en">EN</button>
        <span aria-hidden="true">|</span>
        <button class="footer__lang-btn" lang="de">DE</button>
      </div>
    </div>
  </footer>

  <script>
    lucide.createIcons();
    const html = document.documentElement;
    const saved = localStorage.getItem('pw-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = saved === 'dark' || (!saved && prefersDark);
    html.dataset.theme = dark ? 'dark' : 'light';
    document.getElementById('icon-light').style.display = dark ? 'none' : '';
    document.getElementById('icon-dark').style.display  = dark ? '' : 'none';
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      document.getElementById('icon-light').style.display = isDark ? '' : 'none';
      document.getElementById('icon-dark').style.display  = isDark ? 'none' : '';
      localStorage.setItem('pw-theme', isDark ? 'light' : 'dark');
    });
  </script>
</body>
</html>
