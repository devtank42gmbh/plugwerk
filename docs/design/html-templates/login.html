<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – PlugWerk</title>
  <link rel="stylesheet" href="tokens.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="page-wrapper">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ═══════════════ TOP BAR ═══════════════ -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="index.html" class="topbar__logo" aria-label="PlugWerk – back to catalog">
        <div class="topbar__logo-mark" aria-hidden="true">PW</div>
        <span class="topbar__logo-word">PlugWerk</span>
      </a>
      <div class="topbar__nav" style="margin-left:auto" aria-label="Main navigation">
        <a href="index.html" class="topbar__nav-link">Catalog</a>
      </div>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
          <i data-lucide="sun" width="18" height="18" id="icon-light"></i>
          <i data-lucide="moon" width="18" height="18" id="icon-dark" style="display:none"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════════ AUTH SECTION ═══════════════ -->
  <main id="main-content" class="auth-page">
    <div class="auth-card" role="main">

      <!-- Logo -->
      <div class="auth-card__logo" aria-label="PlugWerk">
        <div class="auth-card__logo-mark" aria-hidden="true">PW</div>
        <span class="auth-card__logo-word">PlugWerk</span>
      </div>

      <!-- Title -->
      <div style="text-align:center">
        <h1 class="auth-card__title" style="font:var(--text-h3)">Welcome back</h1>
        <p style="font:var(--text-small);color:var(--color-text-tertiary);margin-top:4px">Sign in to your account</p>
      </div>

      <!-- ── Login Form (default / validation error state) ── -->
      <form id="login-form" class="auth-card__form" novalidate>
        <!-- Global error banner — shown on invalid credentials -->
        <div
          id="form-error"
          role="alert"
          style="display:none;background:var(--color-status-yanked-bg);border:1px solid var(--color-danger);border-radius:var(--radius-btn);padding:var(--space-3) var(--space-4);font:var(--text-small);color:var(--color-danger);display:flex;align-items:center;gap:var(--space-2)"
        >
          <i data-lucide="alert-circle" width="16" height="16" aria-hidden="true" style="flex-shrink:0"></i>
          <span>Invalid username or password. Please try again.</span>
        </div>

        <div class="form-group">
          <label class="form-label form-label--required" for="username">Username or Email</label>
          <input
            class="form-input"
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            required
            aria-describedby="username-error"
            placeholder="you@example.com"
          />
          <span class="form-error" id="username-error" role="alert" style="display:none">
            <i data-lucide="alert-circle" width="12" height="12" aria-hidden="true"></i>
            Please enter your username or email.
          </span>
        </div>

        <div class="form-group">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <label class="form-label form-label--required" for="password" style="margin-bottom:0">Password</label>
            <a href="forgot-password.html" class="form-helper" style="color:var(--color-primary);font-size:13px">Forgot password?</a>
          </div>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              required
              aria-describedby="password-error"
            />
            <button type="button" class="form-input-toggle" id="pw-toggle" aria-label="Show password" aria-pressed="false">
              <i data-lucide="eye" width="16" height="16" id="pw-icon"></i>
            </button>
          </div>
          <span class="form-error" id="password-error" role="alert" style="display:none">
            <i data-lucide="alert-circle" width="12" height="12" aria-hidden="true"></i>
            Please enter your password.
          </span>
        </div>

        <button type="submit" class="btn btn--primary btn--lg btn--full" id="submit-btn">
          Log In
        </button>
      </form>

      <!-- ── Loading state (shown while submitting) ── -->
      <!-- Replace submit button content with spinner + disabled state via JS -->

      <!-- ── OAuth2 Divider (only shown if providers configured) ── -->
      <div id="oauth-section">
        <div class="form-divider">or</div>

        <div style="display:flex;flex-direction:column;gap:var(--space-2)">
          <!-- GitHub -->
          <button class="oauth-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
            </svg>
            Sign in with GitHub
          </button>

          <!-- GitLab -->
          <button class="oauth-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="m22.65 14.39-9.73 6.96a.74.74 0 0 1-.84 0l-9.73-6.96a.44.44 0 0 1-.12-.56l1.55-4.75 2.86-8.83a.2.2 0 0 1 .38 0l2.86 8.83h5.66l2.86-8.83a.2.2 0 0 1 .38 0l2.86 8.83 1.55 4.75a.44.44 0 0 1-.14.56z"/>
            </svg>
            Sign in with GitLab
          </button>

          <!-- Generic OIDC (Keycloak) -->
          <button class="oauth-btn" type="button">
            <i data-lucide="key-round" width="18" height="18" aria-hidden="true"></i>
            Sign in with Keycloak
          </button>
        </div>
      </div>

      <!-- Card footer — only shown if self-registration enabled -->
      <div class="auth-card__footer">
        Don't have an account?
        <a href="register.html">Sign up</a>
      </div>
    </div>
  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand">
        <strong>PlugWerk</strong>
        <span>v1.2.0</span>
      </div>
      <a href="#" class="footer__link">API Docs</a>
      <div class="footer__lang" style="margin-left:auto">
        <button class="footer__lang-btn footer__lang-btn--active" lang="en">EN</button>
        <span aria-hidden="true">|</span>
        <button class="footer__lang-btn" lang="de">DE</button>
      </div>
    </div>
  </footer>

  <!-- Toast region -->
  <div class="toast-region" role="region" aria-label="Notifications" aria-live="polite"></div>

  <script>
    lucide.createIcons();

    // Theme
    const html = document.documentElement;
    const saved = localStorage.getItem('pw-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = saved === 'dark' || (!saved && prefersDark);
    html.dataset.theme = dark ? 'dark' : 'light';
    document.getElementById('icon-light').style.display = dark ? 'none' : '';
    document.getElementById('icon-dark').style.display  = dark ? '' : 'none';
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      document.getElementById('icon-light').style.display = isDark ? '' : 'none';
      document.getElementById('icon-dark').style.display  = isDark ? 'none' : '';
      localStorage.setItem('pw-theme', isDark ? 'light' : 'dark');
    });

    // Password toggle
    const pwInput  = document.getElementById('password');
    const pwToggle = document.getElementById('pw-toggle');
    const pwIcon   = document.getElementById('pw-icon');
    pwToggle.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      pwIcon.setAttribute('data-lucide', show ? 'eye-off' : 'eye');
      pwToggle.setAttribute('aria-pressed', show);
      pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      lucide.createIcons();
    });

    // Form validation
    const form = document.getElementById('login-form');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      let valid = true;
      const usernameInput = document.getElementById('username');
      const usernameError = document.getElementById('username-error');
      const passwordError = document.getElementById('password-error');

      if (!usernameInput.value.trim()) {
        usernameInput.classList.add('form-input--error');
        usernameError.style.display = 'flex';
        valid = false;
      } else {
        usernameInput.classList.remove('form-input--error');
        usernameError.style.display = 'none';
      }

      if (!pwInput.value) {
        pwInput.classList.add('form-input--error');
        passwordError.style.display = 'flex';
        valid = false;
      } else {
        pwInput.classList.remove('form-input--error');
        passwordError.style.display = 'none';
      }

      if (!valid) return;

      // Simulate loading state
      const btn = document.getElementById('submit-btn');
      btn.classList.add('btn--loading');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      // Simulate error after delay (demo only)
      setTimeout(() => {
        btn.classList.remove('btn--loading');
        btn.disabled = false;
        btn.textContent = 'Log In';
        document.getElementById('form-error').style.display = 'flex';
        lucide.createIcons();
      }, 1800);
    });
  </script>
</body>
</html>
