<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server Error – PlugWerk</title>
  <link rel="stylesheet" href="tokens.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="page-wrapper">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- ═══════════════ TOP BAR ═══════════════ -->
  <header class="topbar" role="banner">
    <div class="topbar__inner">
      <a href="index.html" class="topbar__logo" aria-label="PlugWerk – back to catalog">
        <div class="topbar__logo-mark" aria-hidden="true">PW</div>
        <span class="topbar__logo-word">PlugWerk</span>
      </a>
      <div class="topbar__search" role="search">
        <span class="topbar__search-icon" aria-hidden="true">
          <i data-lucide="search" width="16" height="16"></i>
        </span>
        <input class="topbar__search-input" type="search" placeholder="Search plugins…" aria-label="Search plugins" />
      </div>
      <nav class="topbar__nav" aria-label="Main navigation">
        <a href="index.html" class="topbar__nav-link">Catalog</a>
      </nav>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" id="theme-toggle" aria-label="Toggle dark mode">
          <i data-lucide="sun" width="18" height="18" id="icon-light"></i>
          <i data-lucide="moon" width="18" height="18" id="icon-dark" style="display:none"></i>
        </button>
        <a href="login.html" class="btn btn--secondary btn--sm">Log In</a>
      </div>
    </div>
  </header>

  <!-- ═══════════════ ERROR CONTENT ═══════════════ -->
  <main id="main-content" class="error-page">
    <div class="error-page__inner">

      <!-- Illustration: broken gear -->
      <svg
        class="error-page__illustration"
        viewBox="0 0 160 160"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <!-- Large gear -->
        <circle cx="72" cy="80" r="22"/>
        <circle cx="72" cy="80" r="9"/>
        <!-- Gear teeth (8 teeth) -->
        <line x1="72" y1="50" x2="72" y2="42"/>
        <line x1="72" y1="110" x2="72" y2="118"/>
        <line x1="42" y1="80" x2="34" y2="80"/>
        <line x1="102" y1="80" x2="110" y2="80"/>
        <line x1="51" y1="59" x2="45" y2="53"/>
        <line x1="93" y1="101" x2="99" y2="107"/>
        <line x1="51" y1="101" x2="45" y2="107"/>
        <line x1="93" y1="59" x2="99" y2="53"/>
        <!-- Small broken gear (cracked) -->
        <circle cx="112" cy="52" r="14"/>
        <circle cx="112" cy="52" r="6"/>
        <line x1="112" y1="34" x2="112" y2="29"/>
        <line x1="112" y1="70" x2="112" y2="75"/>
        <line x1="94" y1="52" x2="89" y2="52"/>
        <line x1="130" y1="52" x2="135" y2="52"/>
        <!-- Crack line through small gear -->
        <path d="M106 42 L112 52 L118 46 L114 58" stroke-width="2" opacity="0.7"/>
        <!-- Spark / warning -->
        <line x1="128" y1="30" x2="133" y2="25" opacity="0.5"/>
        <line x1="133" y1="25" x2="136" y2="30" opacity="0.5"/>
        <line x1="138" y1="22" x2="141" y2="17" opacity="0.3"/>
      </svg>

      <div>
        <p class="error-page__code">Error 500</p>
        <h1 class="error-page__title">Something Went Wrong</h1>
      </div>

      <p class="error-page__desc">
        An unexpected server error occurred. Our team has been notified.
        Please try again — if the problem persists, contact your instance administrator.
      </p>

      <div style="display:flex;gap:var(--space-3);flex-wrap:wrap;justify-content:center">
        <button class="btn btn--primary btn--lg" onclick="window.location.reload()">
          <i data-lucide="refresh-cw" width="18" height="18" aria-hidden="true"></i>
          Try Again
        </button>
        <a href="index.html" class="btn btn--secondary btn--lg">
          <i data-lucide="arrow-left" width="18" height="18" aria-hidden="true"></i>
          Back to Catalog
        </a>
      </div>
    </div>
  </main>

  <!-- ═══════════════ FOOTER ═══════════════ -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__brand"><strong>PlugWerk</strong> <span>v1.2.0</span></div>
      <a href="#" class="footer__link">API Docs</a>
      <span class="footer__instance">ACME Corp Plugin Hub</span>
      <div class="footer__lang" style="margin-left:auto">
        <button class="footer__lang-btn footer__lang-btn--active" lang="en">EN</button>
        <span aria-hidden="true">|</span>
        <button class="footer__lang-btn" lang="de">DE</button>
      </div>
    </div>
  </footer>

  <script>
    lucide.createIcons();
    const html = document.documentElement;
    const saved = localStorage.getItem('pw-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const dark = saved === 'dark' || (!saved && prefersDark);
    html.dataset.theme = dark ? 'dark' : 'light';
    document.getElementById('icon-light').style.display = dark ? 'none' : '';
    document.getElementById('icon-dark').style.display  = dark ? '' : 'none';
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = html.dataset.theme === 'dark';
      html.dataset.theme = isDark ? 'light' : 'dark';
      document.getElementById('icon-light').style.display = isDark ? '' : 'none';
      document.getElementById('icon-dark').style.display  = isDark ? 'none' : '';
      localStorage.setItem('pw-theme', isDark ? 'light' : 'dark');
    });
  </script>
</body>
</html>
